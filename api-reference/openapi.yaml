openapi: '3.0.0'
info:
  version: 1.0.0
  title: AIGravity Core API Service
  description: |
    This specification documents the API service for the AIGravity/core monorepo.

    Currently, it covers the NestJS API service health endpoint exposed at `GET /health`.

    The repository also contains a separate AI service implemented with FastAPI that exposes its own `GET /health` endpoint. That endpoint is not described in this API reference specification.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: AIGravity
    url: https://aigravity.dev
    email: support@aigravity.dev
servers:
  - url: http://localhost:3000
    description: API service local development server
tags:
  - name: Health
    description: Service health and readiness operations for the API service
paths:
  /health:
    get:
      tags:
        - Health
      summary: Get API service health
      description: Returns a simple health response for the AIGravity/core API service.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: API service is reachable and healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  responses:
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    HealthResponse:
      type: object
      description: Permissive health response payload for the API service.
      additionalProperties: true
      example:
        status: ok
    Error:
      type: object
      description: Generic error response.
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error message.
          example: Internal server error